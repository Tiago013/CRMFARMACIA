version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: farmaai_user
      POSTGRES_PASSWORD: farmaai_password
      POSTGRES_DB: farmaai_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://farmaai_user:farmaai_password@db:5432/farmaai_db
      - REDIS_URL=redis://redis:6379/0

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["arq", "app.worker.WorkerSettings"]
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://farmaai_user:farmaai_password@db:5432/farmaai_db
      - REDIS_URL=redis://redis:6379/0

volumes:
  pgdata:
  redisdata:
