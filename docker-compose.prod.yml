version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - ENV=production
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=postgres
      - TELEMETRY_ENABLED=true
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.farmaai.com

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=farma_admin
      - POSTGRES_PASSWORD=farma_secure_prod
      - POSTGRES_DB=farma_prod
    volumes:
      - pgdata:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
